<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Adversarial Reviewer Lite audit report anatomy</title>
  <desc id="desc">A visual map of the audit report sections: metadata, summary, findings, builder assessment, verification, decision log, and glossary.</desc>
  <defs>
    <linearGradient id="anatomy-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="url(#anatomy-bg)"/>
  <circle cx="1045" cy="140" r="160" fill="#cffafe" opacity="0.55"/>
  <circle cx="130" cy="695" r="185" fill="#ffedd5" opacity="0.5"/>

  <text x="70" y="72" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="850">What the HTML audit report gives you</text>
  <text x="70" y="109" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="19">The sample HTML is the artifact. This map shows what new users should look for before approving fixes.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="148" width="680" height="560" rx="30" fill="#ffffff"/>
    <rect x="70" y="148" width="680" height="78" rx="30" fill="#0f172a"/>
    <text x="105" y="197" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">Audit Report</text>
    <rect x="580" y="171" width="116" height="32" rx="16" fill="#fed7aa"/>
    <text x="605" y="193" fill="#7c2d12" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">REVISE</text>

    <rect x="105" y="255" width="285" height="74" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="130" y="285" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">1 Metadata</text>
    <text x="130" y="310" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">model, sandbox, approvals, time</text>

    <rect x="415" y="255" width="285" height="74" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="440" y="285" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">2 Executive summary</text>
    <text x="440" y="310" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">plain-English status and risk</text>

    <rect x="105" y="358" width="595" height="128" rx="20" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="130" y="384" width="76" height="28" rx="14" fill="#fee2e2"/>
    <text x="151" y="404" fill="#991b1b" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">HIGH</text>
    <rect x="218" y="384" width="116" height="28" rx="14" fill="#dbeafe"/>
    <text x="241" y="404" fill="#1e3a8a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">ACCEPT</text>
    <text x="130" y="443" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">3 Finding card</text>
    <text x="130" y="469" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">what the reviewer found, where it is, and why it matters</text>

    <rect x="105" y="516" width="285" height="86" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="130" y="548" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">4 Builder assessment</text>
    <text x="130" y="574" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">accept, reject, re-scope, or defer</text>

    <rect x="415" y="516" width="285" height="86" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="440" y="548" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">5 Verification</text>
    <text x="440" y="574" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">tests, commands, evidence, gaps</text>

    <rect x="105" y="628" width="285" height="45" rx="16" fill="#fefce8" stroke="#fde68a"/>
    <text x="130" y="657" fill="#713f12" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">6 Decision and fix log</text>
    <rect x="415" y="628" width="285" height="45" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="440" y="657" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">7 Beginner glossary</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="790" y="170" width="338" height="508" rx="30" fill="#ffffff"/>
    <text x="825" y="223" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="850">Why this helps adoption</text>

    <rect x="825" y="260" width="268" height="76" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="850" y="291" fill="#1e3a8a" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Fast trust check</text>
    <text x="850" y="316" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">Users see the workflow in seconds.</text>

    <rect x="825" y="362" width="268" height="76" rx="18" fill="#fff7ed" stroke="#fdba74"/>
    <text x="850" y="393" fill="#9a3412" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Report-before-code</text>
    <text x="850" y="418" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">The sign-off gate is obvious.</text>

    <rect x="825" y="464" width="268" height="76" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="850" y="495" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Readable for beginners</text>
    <text x="850" y="520" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">The report tells them what to decide.</text>

    <rect x="825" y="566" width="268" height="76" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="850" y="597" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Complements the HTML</text>
    <text x="850" y="622" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="14">SVG explains, HTML demonstrates.</text>
  </g>
</svg>
